services:
  postgres:
    image: postgres:16
    container_name: nestle_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nestle
      POSTGRES_PASSWORD: nestle
      POSTGRES_DB: nestle_newsletter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://nestle:nestle@postgres:5432/nestle_newsletter

  frontend:
    build: ./frontend
    ports:
      - "5173:80"

volumes:
  postgres_data: