services:
  postgres:
    image: postgres:16
    container_name: nestle_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nestle
      POSTGRES_PASSWORD: nestle
      POSTGRES_DB: nestle_ai_newsletter_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123}; do
        sleep 2;
      done;
      mc mb --ignore-existing local/${S3_BUCKET:-nestle-assets};
      "

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - minio
      - minio-init
    environment:
      DATABASE_URL: postgresql://nestle:nestle@postgres:5432/nestle_ai_newsletter_db
      DIRECT_URL: postgresql://nestle:nestle@postgres:5432/nestle_ai_newsletter_db
      CLIENT_ID: ${CLIENT_ID:-}
      CLIENT_SECRET: ${CLIENT_SECRET:-}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: nestle-assets
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_FORCE_PATH_STYLE: "true"
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
