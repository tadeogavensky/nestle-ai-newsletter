name: Backend CI

on:
  workflow_dispatch:
  push:
    branches: [main, staging]
    paths:
      - "backend/**"
      - "packages/shared/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, staging]
    paths:
      - "backend/**"
      - "packages/shared/**"
      - ".github/workflows/backend.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nestle-ai-newsletter-backend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir backend install --frozen-lockfile

      - name: Build backend
        run: pnpm --dir backend run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker_tags
        shell: bash
        run: |
          tags="${IMAGE_NAME}:${GITHUB_SHA}"

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              tags="${tags}"$'\n'"${IMAGE_NAME}:latest"
            elif [ "${GITHUB_REF_NAME}" = "staging" ]; then
              tags="${tags}"$'\n'"${IMAGE_NAME}:staging"
              tags="${tags}"$'\n'"${IMAGE_NAME}:staging-${GITHUB_SHA}"
            fi
          fi

          {
            echo 'tags<<EOF'
            echo "${tags}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.docker_tags.outputs.tags }}
