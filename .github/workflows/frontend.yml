name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: lumennestle

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend run build

      - name: Build Docker image
        run: |
          docker build \
            -t $DOCKERHUB_USERNAME/nestle-newsletter-frontend:latest \
            -t $DOCKERHUB_USERNAME/nestle-newsletter-frontend:${GITHUB_SHA} \
            ./frontend

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push $DOCKERHUB_USERNAME/nestle-newsletter-frontend:latest
          docker push $DOCKERHUB_USERNAME/nestle-newsletter-frontend:${GITHUB_SHA}